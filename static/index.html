<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир Хвостиков — Каталог питомника</title>
    <link rel="stylesheet" href="\css\styles.css">
</head>
<body>

<header>
    <h1>Наши питомцы</h1>
    <p>Найдите своего идеального друга</p>
</header>

<div class="filter-container">
    <button class="filter-btn active" data-filter="all">Все</button>
    <button class="filter-btn" data-filter="dog">Собаки</button>
    <button class="filter-btn" data-filter="cat">Кошки</button>
    <button class="filter-btn" data-filter="other">Другие</button>
</div>

<main class="catalog" id="catalog">
    <div class="pet-card" data-category="dog">
        <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&w=300&q=80" alt="Собака">
        <div class="pet-info">
            <h3>Рекс</h3>
            <p>Порода: Золотистый ретривер</p>
            <p>Возраст: 2 года</p>
            <button class="adopt-btn">Познакомиться</button>
        </div>
    </div>

    <div class="pet-card" data-category="cat">
        <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=300&q=80" alt="Кот">
        <div class="pet-info">
            <h3>Мурка</h3>
            <p>Порода: Сиамская</p>
            <p>Возраст: 1 год</p>
            <button class="adopt-btn">Познакомиться</button>
        </div>
    </div>

    <div class="pet-card" data-category="other">
        <img src="https://images.unsplash.com/photo-1425082661705-1834bfd09dca?auto=format&fit=crop&w=300&q=80" alt="Кролик">
        <div class="pet-info">
            <h3>Снежок</h3>
            <p>Порода: Декоративный кролик</p>
            <p>Возраст: 6 месяцев</p>
            <button class="adopt-btn">Познакомиться</button>
        </div>
    </div>
</main>

<script src="\js\script.js"></script>
</body>
</html>
